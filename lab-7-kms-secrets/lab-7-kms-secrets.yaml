AWSTemplateFormatVersion: '2010-09-09'
Description: 'Lab 7 - KMS & Secrets Manager Encryption'

Resources:

  # IAM Role for Lambda (created first)
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: lab-7-lambda-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: lab-7-secrets-access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref DBSecret
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:DescribeKey
                Resource: !GetAtt MyKMSKey.Arn
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'

  # KMS Customer Managed Key
  MyKMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: 'Lab 7 - Customer Managed Key for Secrets encryption'
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: EnableRootAccess
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'

  # KMS Key Alias
  MyKMSKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: alias/lab-7-key
      TargetKeyId: !Ref MyKMSKey

  # Secrets Manager Secret encrypted with KMS key
  DBSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: 'lab-7/db-password'
      Description: 'Lab 7 - Database password encrypted with KMS CMK'
      KmsKeyId: !Ref MyKMSKey
      SecretString: '{"username":"admin","password":"SuperSecretPassword123!"}'

  # Lambda Function
  SecretRetrieverFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: lab-7-secret-retriever
      Runtime: python3.11
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          import boto3
          import json

          def handler(event, context):
              client = boto3.client('secretsmanager')
              secret = client.get_secret_value(SecretId='lab-7/db-password')
              secret_data = json.loads(secret['SecretString'])
              return {
                  'statusCode': 200,
                  'body': f"Successfully retrieved secret for user: {secret_data['username']}"
              }

Outputs:
  KMSKeyId:
    Value: !Ref MyKMSKey
  KMSKeyAlias:
    Value: !Ref MyKMSKeyAlias
  SecretName:
    Value: !Ref DBSecret
  LambdaFunction:
    Value: !Ref SecretRetrieverFunction