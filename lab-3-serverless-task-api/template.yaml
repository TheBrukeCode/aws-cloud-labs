AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Serverless Task Manager API
  Lambda + API Gateway + DynamoDB

Globals:
  Function:
    Timeout: 10
    Runtime: python3.12
    Environment:
      Variables:
        TABLE_NAME: !Ref TasksTable
        LOG_LEVEL: INFO

Resources:

  # ─────────────────────────────────────────
  # DynamoDB Table
  # ─────────────────────────────────────────
  TasksTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: tasks
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: taskId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: taskId
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # ─────────────────────────────────────────
  # API Gateway
  # ─────────────────────────────────────────
  TaskApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Auth:
        ApiKeyRequired: true
        UsagePlan:
          CreateUsagePlan: PER_API
          UsagePlanName: TaskApiUsagePlan
          Throttle:
            RateLimit: 100
            BurstLimit: 200

  # ─────────────────────────────────────────
  # Lambda Functions
  # ─────────────────────────────────────────
  CreateTaskFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: task-api-create
      CodeUri: src/
      Handler: handlers.create_task.handler
      Description: Create a new task
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TasksTable
      Events:
        CreateTask:
          Type: Api
          Properties:
            RestApiId: !Ref TaskApi
            Path: /tasks
            Method: POST

  GetTaskFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: task-api-get
      CodeUri: src/
      Handler: handlers.get_task.handler
      Description: Get a single task by ID
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref TasksTable
      Events:
        GetTask:
          Type: Api
          Properties:
            RestApiId: !Ref TaskApi
            Path: /tasks/{taskId}
            Method: GET

  ListTasksFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: task-api-list
      CodeUri: src/
      Handler: handlers.list_tasks.handler
      Description: List all tasks for a user
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref TasksTable
      Events:
        ListTasks:
          Type: Api
          Properties:
            RestApiId: !Ref TaskApi
            Path: /tasks
            Method: GET

  UpdateTaskFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: task-api-update
      CodeUri: src/
      Handler: handlers.update_task.handler
      Description: Update an existing task
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TasksTable
      Events:
        UpdateTask:
          Type: Api
          Properties:
            RestApiId: !Ref TaskApi
            Path: /tasks/{taskId}
            Method: PUT

  DeleteTaskFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: task-api-delete
      CodeUri: src/
      Handler: handlers.delete_task.handler
      Description: Delete a task
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TasksTable
      Events:
        DeleteTask:
          Type: Api
          Properties:
            RestApiId: !Ref TaskApi
            Path: /tasks/{taskId}
            Method: DELETE

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${TaskApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
  TasksTableName:
    Description: DynamoDB table name
    Value: !Ref TasksTable
