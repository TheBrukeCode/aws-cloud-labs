AWSTemplateFormatVersion: '2010-09-09'
Description: 'Lab 6 - IAM Security Hardening'

Resources:

  # S3 Bucket for app data (scoped access)
  AppDataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'lab-6-app-data-${AWS::AccountId}'

  # S3 Bucket for CloudTrail logs
  CloudTrailLogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'lab-6-cloudtrail-logs-${AWS::AccountId}'

  # Bucket policy allowing CloudTrail to write logs
  CloudTrailBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref CloudTrailLogsBucket
      PolicyDocument:
        Statement:
          - Sid: AWSCloudTrailAclCheck
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:GetBucketAcl
            Resource: !GetAtt CloudTrailLogsBucket.Arn
          - Sid: AWSCloudTrailWrite
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub '${CloudTrailLogsBucket.Arn}/AWSLogs/${AWS::AccountId}/*'
            Condition:
              StringEquals:
                s3:x-amz-acl: bucket-owner-full-control

  # IAM Role for EC2 with least-privilege S3 access
  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: lab-6-ec2-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: lab-6-s3-least-privilege
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt AppDataBucket.Arn
                  - !Sub '${AppDataBucket.Arn}/*'

  # Instance Profile (attaches role to EC2)
  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: lab-6-instance-profile
      Roles:
        - !Ref EC2InstanceRole

  # CloudTrail to log all API calls
  CloudTrail:
    Type: AWS::CloudTrail::Trail
    DependsOn: CloudTrailBucketPolicy
    Properties:
      TrailName: lab-6-audit-trail
      S3BucketName: !Ref CloudTrailLogsBucket
      IsLogging: true
      IncludeGlobalServiceEvents: true
      IsMultiRegionTrail: false

Outputs:
  AppBucketName:
    Value: !Ref AppDataBucket
  EC2RoleName:
    Value: !Ref EC2InstanceRole
  CloudTrailName:
    Value: !Ref CloudTrails
